              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SequenceRun"
        "400":
          description: Invalid status transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/sequence-runs/{id}/resume:
    post:
      tags: [sequence-runs]
      operationId: resumeSequenceRun
      summary: Resume a paused sequence run
      security:
        - clerkAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: businessId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SequenceRun"
        "400":
          description: Invalid status transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/sequence-runs/{id}/stop:
    post:
      tags: [sequence-runs]
      operationId: stopSequenceRun
      summary: Stop a sequence run permanently
      security:
        - clerkAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: businessId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  enum: [manual_stop]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SequenceRun"
        "400":
          description: Invalid status transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ══════════════════════════════════════════════════════════════════════════
  # MESSAGES
  # ══════════════════════════════════════════════════════════════════════════

  /v1/messages:
    get:
      tags: [messages]
      operationId: listMessages
      summary: List messages for a business
      security:
        - clerkAuth: []
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: customerId
          in: query
          schema:
            type: string
            format: uuid
        - name: invoiceId
          in: query
          schema:
            type: string
            format: uuid
        - name: sequenceRunId
          in: query
          schema:
            type: string
            format: uuid
        - name: channel
          in: query
          schema:
            type: string
            enum: [email, sms]
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, sent, delivered, bounced, failed]
        - name: hasReply
          in: query
          schema:
            type: boolean
        - name: sentAfter
          in: query
          schema:
            type: string
            format: date-time
        - name: sentBefore
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/messages/{id}:
    get:
      tags: [messages]
      operationId: getMessage
      summary: Get a message by ID
      security:
        - clerkAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: businessId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/messages/{id}/send-reply:
    post:
      tags: [messages]
      operationId: sendMessageReply
      summary: Send a reply to a message thread
      security:
        - clerkAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: businessId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body, resumeSequence]
              properties:
                body:
                  type: string
                  minLength: 1
                resumeSequence:
                  type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: No reply-to message to respond to
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: Customer has no email address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "502":
          description: Email send failed (upstream error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ══════════════════════════════════════════════════════════════════════════
  # RELATIONSHIP TIERS
  # ══════════════════════════════════════════════════════════════════════════

  /v1/relationship-tiers:
    get:
      tags: [relationship-tiers]
      operationId: listRelationshipTiers
      summary: List relationship tiers for a business
      security:
        - clerkAuth: []
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RelationshipTier"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [relationship-tiers]
      operationId: createRelationshipTier
      summary: Create a relationship tier
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessId, name]
              properties:
                businessId:
                  type: string
                  format: uuid
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                description:
                  type: string
                  maxLength: 1000
                  nullable: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RelationshipTier"
        "400":
          description: Tier limit reached or name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/relationship-tiers/{id}:
    patch:
      tags: [relationship-tiers]
      operationId: updateRelationshipTier
      summary: Update a relationship tier
      security:
        - clerkAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessId]
              properties:
                businessId:
                  type: string
                  format: uuid
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                description:
                  type: string
                  maxLength: 1000
                  nullable: true
                sequenceId:
                  type: string
                  format: uuid
                  nullable: true
                isDefault:
                  type: boolean
                sortOrder:
                  type: integer
                  minimum: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RelationshipTier"
        "400":
          description: Name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [relationship-tiers]
      operationId: deleteRelationshipTier
      summary: Delete a relationship tier
      security:
        - clerkAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: businessId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "400":
          description: Cannot delete default tier or tier with active sequences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ══════════════════════════════════════════════════════════════════════════
  # USERS
  # ══════════════════════════════════════════════════════════════════════════

  /v1/users:
    get:
      tags: [users]
      operationId: listUsers
      summary: List all users (active + pending) on the caller's account
      security:
        - clerkAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/users/invite:
    post:
      tags: [users]
      operationId: inviteUser
      summary: Invite a new user to the account
      description: Requires caller to be owner or admin.
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [admin, viewer]
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/InviteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden — caller is not owner or admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "502":
          description: Invite send failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/users/invites/{id}:
    delete:
      tags: [users]
      operationId: cancelInvite
      summary: Cancel a pending invite
      description: Requires caller to be owner or admin.
      security:
        - clerkAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invite already accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/users/invites/{id}/resend:
    post:
      tags: [users]
      operationId: resendInvite
      summary: Resend a pending invite email
      description: Requires caller to be owner or admin.
      security:
        - clerkAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/InviteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invite already accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "502":
          description: Invite send failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/users/{id}:
    patch:
      tags: [users]
      operationId: updateUserRole
      summary: Update a user's role
      description: Requires caller to be owner.
      security:
        - clerkAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, viewer]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          description: Cannot change own role or owner's role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden — caller is not owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [users]
      operationId: removeUser
      summary: Remove a user from the account
      description: Requires caller to be owner.
      security:
        - clerkAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: No Content
        "400":
          description: Cannot remove self or owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden — caller is not owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"

  # ══════════════════════════════════════════════════════════════════════════
  # CONNECTIONS / OAUTH
  # ══════════════════════════════════════════════════════════════════════════

  /v1/connections/authorize:
    post:
      tags: [connections]
      operationId: authorizeConnection
      summary: Start an OAuth connection for an accounting provider
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessId, provider]
              properties:
                businessId:
                  type: string
                  format: uuid
                provider:
                  type: string
                  enum: [quickbooks, xero]
      responses:
        "200":
          description: OK — returns the authorization URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Connection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/connections/quickbooks/callback:
    get:
      tags: [quickbooks-oauth]
      operationId: quickbooksOauthCallback
      summary: QuickBooks OAuth 2.0 callback
      description: >
        Browser redirect target after QuickBooks authorization. Completes the
        connection and redirects back to the frontend. Not called directly by
        API clients.
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: realmId
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to frontend after connection complete

  /v1/connections/xero/callback:
    get:
      tags: [xero-oauth]
      operationId: xeroOauthCallback
      summary: Xero OAuth 2.0 callback
      description: >
        Browser redirect target after Xero authorization. Completes the
        connection and redirects back to the frontend. Not called directly by
        API clients.
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to frontend after connection complete

  # ══════════════════════════════════════════════════════════════════════════
  # BILLING
  # ══════════════════════════════════════════════════════════════════════════

  /v1/billing/status:
    get:
      tags: [billing]
      operationId: getBillingStatus
      summary: Get billing/subscription status for the caller's account
      security:
        - clerkAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BillingStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/billing/create-checkout:
    post:
      tags: [billing]
      operationId: createBillingCheckout
      summary: Create a Stripe checkout session
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan]
              properties:
                plan:
                  type: string
                  enum: [starter, growth, agency]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CheckoutResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/billing/create-portal:
    post:
      tags: [billing]
      operationId: createBillingPortal
      summary: Create a Stripe customer portal session
      security:
        - clerkAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PortalResult"
        "400":
          description: No Stripe customer attached to this account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ══════════════════════════════════════════════════════════════════════════
  # DEV (internal, protected by x-dev-key)
  # ══════════════════════════════════════════════════════════════════════════

  /v1/dev/weekly-summary/trigger:
    post:
      tags: [dev]
      operationId: devTriggerWeeklySummary
      summary: "[DEV] Enqueue a weekly summary job for a business"
      security:
        - devKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessId]
              properties:
                businessId:
                  type: string
                  format: uuid
                weekStartsAt:
                  type: string
                  format: date
                  description: >
                    ISO date (YYYY-MM-DD). Defaults to the most recent Monday
                    UTC if omitted.
                  example: "2026-05-19"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/WeeklySummaryJobResult"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/dev/clerk-orgs/backfill:
    post:
      tags: [dev]
      operationId: devBackfillClerkOrgs
      summary: "[DEV] Backfill Clerk organizations for legacy accounts"
      security:
        - devKey: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BackfillClerkOrgsResult"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ══════════════════════════════════════════════════════════════════════════
  # WEBHOOKS
  # ══════════════════════════════════════════════════════════════════════════

  /v1/webhooks/clerk:
    post:
      tags: [clerk-webhook]
      operationId: clerkWebhookHandle
      summary: Receive Clerk user lifecycle events
      description: >
        Handles `user.created` (account provisioning or legacy invite link) and
        `organizationMembership.created` (org-scoped invite acceptance).
        Unknown event types are silently acked.
      security:
        - clerkWebhookSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "200":
          description: OK — event processed
        "400":
          description: Malformed payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/webhooks/resend/events:
    post:
      tags: [resend-webhook]
      operationId: resendWebhookHandle
      summary: Receive Resend email delivery events
      description: >
        Idempotent — duplicate batches (same Svix message ID) are silently
        acked with 200.
      security:
        - resendSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "200":
          description: OK

  /v1/webhooks/stripe:
    post:
      tags: [stripe-webhook]
      operationId: stripeWebhookHandle
      summary: Receive Stripe billing events
      description: >
        Idempotent — duplicate events (same Stripe event ID) are silently
        acked with 200.
      security:
        - stripeSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "200":
          description: OK

  /v1/webhooks/quickbooks:
    post:
      tags: [quickbooks-webhook]
      operationId: quickbooksWebhookHandle
      summary: Receive QuickBooks data-change notifications
      security:
        - intuitSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "200":
          description: OK

  /v1/webhooks/xero:
    post:
      tags: [xero-webhook]
      operationId: xeroWebhookHandle
      summary: Receive Xero data-change notifications
      security:
        - xeroSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "200":
          description: OK

  /v1/webhooks/twilio/status:
    post:
      tags: [twilio-webhook]
      operationId: twilioStatusCallback
      summary: Receive Twilio SMS delivery status callbacks
      description: >
        Authenticated via the `secret` query parameter matched against
        TWILIO_WEBHOOK_SECRET. Body is application/x-www-form-urlencoded
        (Twilio default). Only logs the status — no side-effects persisted yet.
      security:
        - twilioSecret: []
      parameters:
        - name: secret
          in: query
          required: true
          schema:
            type: string
        - name: businessId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: invoiceId
          in: query
          schema:
            type: string
            format: uuid
        - name: sequenceStepId
          in: query
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TwilioStatusCallback"
      responses:
        "200":
          description: OK — status logged
        "401":
          description: Invalid or missing secret

  /v1/webhooks/twilio/inbound:
    post:
      tags: [twilio-webhook]
      operationId: twilioInboundMessage
      summary: Receive inbound SMS replies from customers
      description: >
        Twilio posts an inbound SMS to this endpoint when a customer replies to a
        message Nudge sent. The request is authenticated by Twilio's
        `X-Twilio-Signature` header (HMAC-SHA1 of URL + sorted form params, signed
        with `TWILIO_AUTH_TOKEN`). Body is application/x-www-form-urlencoded.

        On a valid signature, the controller enqueues a `twilio-events` job
        (`type: sms.received`) keyed by `MessageSid` for idempotency. The worker
        normalizes the sender's number to digits, matches it against active
        sequence runs' customer `contact_phone`, stops each match with
        `stopped_reason=client_replied`, and emails the business owner.

        Returns 200 even when no matching run is found — the webhook is fire-and-forget
        from Twilio's perspective.
      security:
        - twilioSignature: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TwilioInboundMessage"
      responses:
        "200":
          description: OK — enqueued (or silently skipped if MessageSid/From missing)
        "403":
          description: Missing or invalid `X-Twilio-Signature`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

# ─────────────────────────────────────────────────────────────────────────────
