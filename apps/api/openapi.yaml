openapi: 3.0.3
info:
  title: Nudge API
  version: 1.0.0
  description: >
    Nudge — B2B accounts receivable follow-up automation API.

    **Note:** This specification was reverse-engineered from the codebase at HEAD
    (branch feat/dev-clerk-orgs-backfill, 2026-05-24). Field types are best-effort
    inferred from Zod schemas and controller return statements. For ambiguous cases
    the type defaults to `string` and is noted inline. Response schemas reflect the
    actual keys returned by controllers (snake_case where controllers use it,
    camelCase where they do not). Monetary values are integers in cents throughout.

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.nudge.app
    description: Production (placeholder)

# ─────────────────────────────────────────────────────────────────────────────
# Security schemes
# ─────────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    clerkAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Clerk session JWT obtained from the Clerk frontend SDK.

    devKey:
      type: apiKey
      in: header
      name: x-dev-key
      description: Internal development key. Never exposed in production.

    resendSignature:
      type: apiKey
      in: header
      name: svix-signature
      description: >
        Resend webhook signature (Svix). The guard also reads svix-id and
        svix-timestamp headers to prevent replay attacks.

    stripeSignature:
      type: apiKey
      in: header
      name: stripe-signature
      description: Stripe webhook signature for verifying Stripe events.

    intuitSignature:
      type: apiKey
      in: header
      name: intuit-signature
      description: QuickBooks / Intuit webhook HMAC-SHA256 signature.

    xeroSignature:
      type: apiKey
      in: header
      name: x-xero-signature
      description: Xero webhook SHA-256 HMAC signature.

    clerkWebhookSignature:
      type: apiKey
      in: header
      name: svix-signature
      description: Clerk webhook signature (Svix) for user lifecycle events.

    twilioSecret:
      type: apiKey
      in: query
      name: secret
      description: >
        Shared secret passed as a query parameter on Twilio status-callback
        requests. Validated against TWILIO_WEBHOOK_SECRET env var.

    twilioSignature:
      type: apiKey
      in: header
      name: x-twilio-signature
      description: >
        Twilio's HMAC-SHA1 request signature. Computed as
        `base64(hmac-sha1(TWILIO_AUTH_TOKEN, fullUrl + concat(sortedFormParams)))`
        where sortedFormParams is each key+value pair concatenated in lexicographic
        order. Used for inbound message webhooks.

  # ───────────────────────────────────────────────────────────────────────────
  # Schemas
  # ───────────────────────────────────────────────────────────────────────────
  schemas:

    # ── Error envelope ────────────────────────────────────────────────────────
    ErrorEnvelope:
      type: object
      required: [statusCode, error, message]
      properties:
        statusCode:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Validation failed
        details:
          description: Optional structured validation details.
          type: object
          additionalProperties: true

    # ── Template ──────────────────────────────────────────────────────────────
    Template:
      type: object
      required: [id, businessId, name, body, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        name:
          type: string
          example: "30-Day Overdue Reminder"
        subject:
          type: string
          nullable: true
          example: "Invoice #{{invoiceNumber}} is overdue"
        body:
          type: string
          example: "Hi {{customerName}}, your invoice is overdue…"
        signature:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AiTemplateDraft:
      type: object
      description: >
        AI-generated template draft returned by POST /v1/templates/generate.
        Exact shape is determined by the AI client port implementation; fields
        listed here are best-effort.
      properties:
        subject:
          type: string
          nullable: true
        body:
          type: string
        signature:
          type: string
          nullable: true

    # ── Business ──────────────────────────────────────────────────────────────
    Business:
      type: object
      required: [id, accountId, name, accountingProvider, senderName, senderEmail, timezone, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        name:
          type: string
        accountingProvider:
          type: string
          enum: [quickbooks, xero]
        senderName:
          type: string
        senderEmail:
          type: string
          format: email
        emailSignature:
          type: string
          nullable: true
        timezone:
          type: string
          description: IANA timezone string
          example: "America/New_York"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SyncResult:
      type: object
      description: Result returned by POST /v1/businesses/:id/sync.
      properties:
        jobId:
          type: string
        status:
          type: string
          example: enqueued

    # ── Customer ──────────────────────────────────────────────────────────────
    Customer:
      type: object
      required: [id, businessId, companyName, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        companyName:
          type: string
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        isActive:
          type: boolean
        relationshipTierId:
          type: string
          format: uuid
          nullable: true
        sequenceId:
          type: string
          format: uuid
          nullable: true
        totalOutstandingCents:
          type: integer
          description: Total outstanding balance in cents
        avgDaysToPay:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CustomerList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Customer"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # ── Invoice ───────────────────────────────────────────────────────────────
    Invoice:
      type: object
      required: [id, businessId, customerId, status, amountCents, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        externalId:
          type: string
          nullable: true
          description: Invoice number from the accounting provider
        status:
          type: string
          enum: [open, overdue, partial, paid, voided, disputed]
        amountCents:
          type: integer
          description: Invoice total in cents
        balanceCents:
          type: integer
          description: Remaining balance in cents
        dueDate:
          type: string
          format: date
          nullable: true
        paidAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InvoiceList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    PaymentLink:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: Stripe payment link URL

    # ── Sequence ──────────────────────────────────────────────────────────────
    SequenceStep:
      type: object
      required: [id, sequenceId, stepOrder, delayDays, channel, bodyTemplate]
      properties:
        id:
          type: string
          format: uuid
        sequenceId:
          type: string
          format: uuid
        stepOrder:
          type: integer
          minimum: 1
        delayDays:
          type: integer
          minimum: 0
        channel:
          type: string
          enum: [email, sms, email_and_sms]
        subjectTemplate:
          type: string
          nullable: true
        bodyTemplate:
          type: string
        smsBodyTemplate:
          type: string
          nullable: true
        isOwnerAlert:
          type: boolean
        includePaymentLink:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Sequence:
      type: object
      required: [id, businessId, name, isActive, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        name:
          type: string
        isActive:
          type: boolean
        relationshipTierId:
          type: string
          format: uuid
          nullable: true
        steps:
          type: array
          items:
            $ref: "#/components/schemas/SequenceStep"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SequenceStepInput:
      type: object
      required: [stepOrder, delayDays, channel, bodyTemplate]
      properties:
        stepOrder:
          type: integer
          minimum: 1
        delayDays:
          type: integer
          minimum: 0
        channel:
          type: string
          enum: [email, sms, email_and_sms]
        subjectTemplate:
          type: string
          nullable: true
        bodyTemplate:
          type: string
          minLength: 1
        smsBodyTemplate:
          type: string
          nullable: true
        isOwnerAlert:
          type: boolean
        includePaymentLink:
          type: boolean

    StepPreview:
      type: object
      description: >
        Rendered preview of a sequence step against example data.
        Exact shape determined by the PreviewStepUseCase implementation.
      properties:
        subject:
          type: string
          nullable: true
        body:
          type: string
        smsBody:
          type: string
          nullable: true

    # ── Sequence Run ──────────────────────────────────────────────────────────
    SequenceRun:
      type: object
      required: [id, businessId, sequenceId, customerId, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        sequenceId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        invoiceId:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: [active, paused, stopped, completed]
        currentStepOrder:
          type: integer
        nextFireAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SequenceRunList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SequenceRun"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # ── Message ───────────────────────────────────────────────────────────────
    Message:
      type: object
      required: [id, businessId, customerId, channel, status, sentAt, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        invoiceId:
          type: string
          format: uuid
          nullable: true
        sequenceRunId:
          type: string
          format: uuid
          nullable: true
        channel:
          type: string
          enum: [email, sms]
        status:
          type: string
          enum: [queued, sent, delivered, bounced, failed]
        subject:
          type: string
          nullable: true
        body:
          type: string
        sentAt:
          type: string
          format: date-time
          nullable: true
        hasReply:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MessageList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # ── RelationshipTier ──────────────────────────────────────────────────────
    RelationshipTier:
      type: object
      required: [id, businessId, name, isDefault, sortOrder, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
          maxLength: 1000
        isDefault:
          type: boolean
        sortOrder:
          type: integer
          minimum: 0
        sequenceId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── User ──────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, email, role, status]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        role:
          type: string
          enum: [owner, admin, viewer]
        status:
          type: string
          enum: [active, pending]
        clerkUserId:
          type: string
          nullable: true

    InviteResponse:
      type: object
      required: [id, email, role, status]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        role:
          type: string
          enum: [admin, viewer]
        status:
          type: string
          enum: [pending]
        clerkInvitationId:
          type: string
          nullable: true

    # ── Connection ────────────────────────────────────────────────────────────
    Connection:
      type: object
      description: >
        OAuth connection to an accounting provider. Exact shape determined by
        the StartConnectionUseCase and CompleteConnectionUseCase implementations.
      properties:
        authUrl:
          type: string
          format: uri
          description: OAuth authorization URL to redirect the user to.

    # ── Billing ───────────────────────────────────────────────────────────────
    BillingStatus:
      type: object
      required: [plan, status, has_stripe_customer]
      properties:
        plan:
          type: string
          enum: [starter, growth, agency]
          nullable: true
          description: Current subscription plan; null if on free/trial
        status:
          type: string
          enum: [active, trialing, past_due, canceled, incomplete]
          nullable: true
        current_period_end:
          type: string
          format: date-time
          nullable: true
        cancel_at_period_end:
          type: boolean
          nullable: true
        trial_ends_at:
          type: string
          format: date-time
          nullable: true
        has_stripe_customer:
          type: boolean

    CheckoutResult:
      type: object
      required: [checkout_url]
      properties:
        checkout_url:
          type: string
          format: uri

    PortalResult:
      type: object
      required: [portal_url]
      properties:
        portal_url:
          type: string
          format: uri

    # ── Dev ───────────────────────────────────────────────────────────────────
    WeeklySummaryJobResult:
      type: object
      required: [jobId, businessId, weekStartsAt]
      properties:
        jobId:
          type: string
        businessId:
          type: string
          format: uuid
        weekStartsAt:
          type: string
          format: date
          example: "2026-05-19"

    BackfillClerkOrgsResult:
      type: object
      description: >
        Result of the Clerk org backfill operation. Exact shape from
        BackfillClerkOrgsUseCase; fields best-effort.
      properties:
        processed:
          type: integer
        skipped:
          type: integer
        errors:
          type: integer

    # ── Webhook payloads (third-party — accept any JSON) ─────────────────────
    WebhookPayload:
      type: object
      additionalProperties: true
      description: Arbitrary JSON payload delivered by the third-party provider.

    TwilioStatusCallback:
      type: object
      description: >
        Form-encoded Twilio status callback body. Keys match Twilio's documented
        StatusCallback parameters.
      properties:
        MessageSid:
          type: string
        MessageStatus:
          type: string
          enum: [queued, sending, sent, delivered, undelivered, failed, read]
        To:
          type: string
        ErrorCode:
          type: string
          nullable: true
      additionalProperties: true

    TwilioInboundMessage:
      type: object
      description: >
        Form-encoded Twilio inbound-message body. Keys match Twilio's documented
        incoming-message parameters. Only the fields Nudge consumes are typed —
        Twilio sends many more (FromCity, FromCountry, NumMedia, etc.).
      required: [MessageSid, From]
      properties:
        MessageSid:
          type: string
          description: Twilio's unique ID for the inbound message (e.g. `SM...`).
        From:
          type: string
          description: Sender's phone number in E.164 (e.g. `+15551234567`).
        To:
          type: string
          description: The Nudge-owned Twilio number that received the SMS.
        Body:
          type: string
          description: The text body of the inbound message.
        AccountSid:
          type: string
      additionalProperties: true

    # ── Shared ────────────────────────────────────────────────────────────────
    PaginationMeta:
      type: object
      required: [page, limit, total]
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

# ─────────────────────────────────────────────────────────────────────────────
# Default security (overridden per-operation for webhooks & dev)
# ─────────────────────────────────────────────────────────────────────────────
security:
  - clerkAuth: []

# ─────────────────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ══════════════════════════════════════════════════════════════════════════
  # TEMPLATES
  # ══════════════════════════════════════════════════════════════════════════

  /v1/templates:
    get:
      tags: [templates]
      operationId: listTemplates
      summary: List templates for a business
      security:
        - clerkAuth: []
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Template"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [templates]
      operationId: createTemplate
      summary: Create a template
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessId, name, body]
              properties:
                businessId:
                  type: string
                  format: uuid
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                subject:
                  type: string
                  nullable: true
                body:
                  type: string
                  minLength: 1
                signature:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Template"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/templates/generate:
    post:
      tags: [templates]
      operationId: generateTemplate
      summary: AI-generate a template draft
      security:
        - clerkAuth: []
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [description]
              properties:
                description:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AiTemplateDraft"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/templates/{id}:
    get:
      tags: [templates]
      operationId: getTemplate
      summary: Get a template by ID
      security:
        - clerkAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: businessId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Template"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [templates]
      operationId: updateTemplate
      summary: Update a template
      security:
        - clerkAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessId]
              properties:
                businessId:
                  type: string
                  format: uuid
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                subject:
                  type: string
                  nullable: true
                body:
                  type: string
                  minLength: 1
                signature:
                  type: string
                  nullable: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Template"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [templates]
      operationId: deleteTemplate
      summary: Delete a template
      security:
        - clerkAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: businessId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ══════════════════════════════════════════════════════════════════════════
  # CUSTOMERS — template attachment sub-resource
  # ══════════════════════════════════════════════════════════════════════════

  /v1/customers/{customerId}/templates:
    post:
      tags: [customers, templates]
      operationId: attachTemplateToCustomer
      summary: Attach a template to a customer
      security:
        - clerkAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessId, templateId]
              properties:
                businessId:
                  type: string
                  format: uuid
                templateId:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Created — no body
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/customers/{customerId}/templates/{templateId}:
    delete:
      tags: [customers, templates]
      operationId: detachTemplateFromCustomer
      summary: Detach a template from a customer
      security:
        - clerkAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: templateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: businessId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ══════════════════════════════════════════════════════════════════════════
  # BUSINESSES
  # ══════════════════════════════════════════════════════════════════════════

  /v1/businesses:
    post:
      tags: [business]
      operationId: createBusiness
      summary: Create a new business
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
