        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                senderName:
                  type: string
                  minLength: 1
                senderEmail:
                  type: string
                  format: email
                emailSignature:
                  type: string
                  nullable: true
                timezone:
                  type: string
                  description: IANA timezone string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Business"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [business]
      operationId: deleteBusiness
