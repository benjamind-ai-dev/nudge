        - clerkAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/businesses/{id}/sync:
    post:
      tags: [business]
      operationId: triggerManualSync
      summary: Trigger a manual sync with the accounting provider
      security:
        - clerkAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              # body must be an empty object (strict schema)
              additionalProperties: false
      responses:
        "202":
          description: Accepted — sync job enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SyncResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: No active connection — cannot sync
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Sync rate limited
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds until the caller may retry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

